{% extends 'quizApp/base.html' %}
{% block content %}
<div class="result-container">
    <div class="card neon-card">
        <h1 class="result-title">Quiz Completed!</h1>
        <h2 class="logo-title">{{ quiz.title }}</h2>
        
        <div class="circle">
            {{ score }}/{{ total }}
        </div>
        
        <p class="score-text">
            {% if score == total %}
                🔥 Absolute Legend!
            {% elif score > 0 %}
                Good job! Keep practicing.
            {% else %}
                Better luck next time!
            {% endif %}
        </p>

        <div class="result-buttons">
            <a href="{% url 'home' %}">
                <button class="start-btn">Back to Dashboard</button>
            </a>
        </div>
    </div>
</div>
{% endblock %}
