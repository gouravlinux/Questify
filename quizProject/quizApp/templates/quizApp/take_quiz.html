{% extends 'quizApp/base.html' %} {% block content %}
<div class="quiz-container">
  <div class="quiz-header">
    <h2 class="logo-title">{{ quiz.title }}</h2>
    <div class="timer">Time Remaining: <span id="clock">--:--</span></div>
    <script>
      // Django will replace {{ quiz.time_limit }} with the actual number from SQLite
      let minutes = {{ quiz.time_limit }};
      let time = minutes * 60;
      const timerHtml = document.getElementById('clock');

      const countdown = setInterval(() => {
          let currentMins = Math.floor(time / 60);
          let currentSecs = time % 60;

          timerHtml.innerHTML = `${currentMins}:${currentSecs < 10 ? '0' : ''}${currentSecs}`;

          if (time <= 0) {
              clearInterval(countdown);
              alert("Time is up! Submitting your answers.");
              document.querySelector('form').submit(); // Force submission
          }
          time--;
      }, 1000);
    </script>
  </div>

  <form method="POST" action="{% url 'submit_quiz' quiz.id %}">
    {% csrf_token %} {% for question in questions %}
    <div class="card neon-card" style="margin-bottom: 20px; text-align: left">
      <h4>Question {{ forloop.counter }}: {{ question.text }}</h4>
      <hr style="border-color: #ff00c8; margin: 10px 0" />

      <div class="options">
        {% if question.q_type == 'SINGLE' %}
        <label class="option">
          <input type="radio" name="q_{{ question.id }}" value="1" />
          <span>{{ question.option1 }}</span>
        </label>
        <label class="option">
          <input type="radio" name="q_{{ question.id }}" value="2" />
          <span>{{ question.option2 }}</span>
        </label>
        <label class="option">
          <input type="radio" name="q_{{ question.id }}" value="3" />
          <span>{{ question.option3 }}</span>
        </label>
        <label class="option">
          <input type="radio" name="q_{{ question.id }}" value="4" />
          <span>{{ question.option4 }}</span>
        </label>
        {% else %}
        <label class="option">
          <input type="checkbox" name="q_{{ question.id }}[]" value="1" />
          <span>{{ question.option1 }}</span>
        </label>
        <label class="option">
          <input type="checkbox" name="q_{{ question.id }}[]" value="2" />
          <span>{{ question.option2 }}</span>
        </label>
        <label class="option">
          <input type="checkbox" name="q_{{ question.id }}[]" value="3" />
          <span>{{ question.option3 }}</span>
        </label>
        <label class="option">
          <input type="checkbox" name="q_{{ question.id }}[]" value="4" />
          <span>{{ question.option4 }}</span>
        </label>
        {% endif %}
      </div>
    </div>
    {% endfor %}

    <button type="submit" class="start-btn" style="width: 100%">
      Submit Quiz
    </button>
  </form>
</div>
{% endblock %}
