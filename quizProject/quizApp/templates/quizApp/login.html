{% extends 'quizApp/base.html' %}

{% block content %}
<div class="login-container">
    <div class="card neon-card login-card">
        <h2 class="logo-title">Questify</h2>
        <h3>Login</h3>
        
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required style="margin-top: 15px;">
            
            {% if error %}
                <p style="color: #ff4da6; margin-top: 10px;">{{ error }}</p>
            {% endif %}

            <div class="login-actions">
                <button type="submit" class="start-btn">Login</button>
            </div>
        </form>
        <p class="register-text">
            New to Questify? <a href="{% url 'register' %}" style="color: #ff00c8; text-decoration: none;">Register now</a>
        </p>
    </div>
</div>
{% endblock %}
