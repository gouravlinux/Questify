{% extends 'quizApp/base.html' %}
{% block content %}
<div class="login-container">
    <div class="card neon-card login-card" style="width: 600px;">
        <h2 class="logo-title">Questify</h2>
        <h3>Adding to: {{ quiz.title }}</h3>
        
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="question_text" placeholder="Enter Question" required>
            
            <select name="question_type" style="margin-top:10px; width:100%;">
                <option value="SINGLE">Single Correct</option>
                <option value="MULTIPLE">Multiple Correct</option>
            </select>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px;">
                <input type="text" name="opt1" placeholder="Option 1" required>
                <input type="text" name="opt2" placeholder="Option 2" required>
                <input type="text" name="opt3" placeholder="Option 3" required>
                <input type="text" name="opt4" placeholder="Option 4" required>
            </div>

            <input type="text" name="correct_answers" placeholder="Correct indices (e.g. 1 or 1,3)" style="margin-top:15px;">

            <div class="login-actions" style="margin-top: 20px;">
                <button type="submit" name="add_more" class="start-btn" style="background: #444;">Save & Add Another</button>
                <button type="submit" name="finish" class="start-btn">Finish Quiz</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
