{% extends 'base.html' %} {% load static %} {% block title %} Student Dashboard {% endblock %} 
{% block extra_css %}

<link
  rel="stylesheet"
  href="{% static 'css/dashboard.css' %}"
>

{% endblock %}
{% block content %}
<div class="dashboard-container">
  <h1 class="title">Student Dashboard</h1>

  <div class="dashboard">
    <div class="card-student" onclick='location.href="{% url "home" %}"'>
      <div class="icon">🔍</div>

      <h3>Join Quiz</h3>
    </div>

    <div class="card-student" onclick='location.href="{% url "leaderboard" %}"'>
      <div class="icon">👥</div>

      <h3>Leaderboard</h3>
    </div>

    <div class="card-student" onclick='location.href="{% url "myresults" %}"'>
      <div class="icon">📊</div>

      <h3>My Results</h3>
    </div>
  </div>
</div>
{% endblock %}
