{% extends 'base.html' %}

{% load static %}

{% block title %}
Quiz Result
{% endblock %}

{% block extra_css %}

<link
  rel="stylesheet"
  href="{% static 'css/result.css' %}"
>

{% endblock %}

{% block content %}

<div class="result-container">

    <div class="result-card">

        <h1>
            QUIZ RESULT
        </h1>

        <h2>
            Your Score
        </h2>

        <div class="score-circle">

            {{ score }}/{{ total }}

        </div>

        <div class="result-buttons">

            <a
              href="{% url 'home' %}"
              class="result-btn"
            >
                Try Again
            </a>

            <a
              href="{% url 'studentdashboard' %}"
              class="result-btn"
            >
                Dashboard
            </a>

        </div>

    </div>

</div>

{% endblock %}
